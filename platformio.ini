[env:m5dial]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    m5stack/M5Dial
    lvgl/lvgl @ ^8.3.0
    links2004/WebSockets @ ^2.4.0

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_FONT_MONTSERRAT_32=1
